<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FairAI 3D Hero Orbit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="hero-3d" id="hero3d">
      <div class="bg-grid"></div>
      <div class="bg-vignette"></div>

      <div class="particle-layer" id="particleLayer" aria-hidden="true"></div>

      <div class="center-zone" aria-label="FairAI core">
        <div class="orbit-ring ring-1"></div>
        <div class="orbit-ring ring-2"></div>
        <div class="orbit-ring ring-3"></div>

        <div class="chip-glow"></div>
        <div class="center-chip">
          <div class="chip-inner">
            <img src="../../assets/Fair ai 3d.png" alt="FairAI center chip" loading="eager" />
          </div>
        </div>
      </div>

      <section class="orbit" id="orbit" aria-label="Orbiting AI system status cards">
        <article class="orbit-card card-1">
          <img src="../../assets/Bias.png" alt="Bias Detection card" loading="lazy" />
        </article>
        <article class="orbit-card card-2">
          <img src="../../assets/Fairness.png" alt="Fairness Score card" loading="lazy" />
        </article>
        <article class="orbit-card card-3">
          <img src="../../assets/Explainability.png" alt="Explainability card" loading="lazy" />
        </article>
        <article class="orbit-card card-4">
          <img src="../../assets/Confidence.png" alt="Confidence card" loading="lazy" />
        </article>
        <article class="orbit-card card-5">
          <img src="../../assets/What if Analysis.png" alt="What-if Analysis card" loading="lazy" />
        </article>
        <article class="orbit-card card-6">
          <img src="../../assets/False detection.png" alt="False Detection card" loading="lazy" />
        </article>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
